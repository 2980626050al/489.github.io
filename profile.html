<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人资料 - 居家适老</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">居家适老</a>
            <ul class="nav-links">
                <li><a href="index.html">首页</a></li>
                <li><a href="entrance.html">玄关区域</a></li>
                <li><a href="livingroom.html">客厅区域</a></li>
                <li><a href="bedroom.html">卧室区域</a></li>
                <li><a href="bathroom.html">卫生间区域</a></li>
                <li><a href="kitchen.html">厨房区域</a></li>
            </ul>
            <div class="nav-actions">
                <a href="cart.html" class="btn-cart">购物车</a>
                <div class="menu-toggle" id="menuToggle">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </div>
    </nav>

    <div class="side-menu-overlay" id="sideMenuOverlay"></div>
    <div class="side-menu" id="sideMenu">
        <div class="side-menu-header">
            <h3>菜单</h3>
            <button class="side-menu-close" id="sideMenuClose">×</button>
        </div>
        <div class="side-menu-content">
            <a href="profile.html" class="side-menu-item">
                <span class="side-menu-icon"></span>
                个人资料
            </a>
            <a href="login.html" class="side-menu-item">
                <span class="side-menu-icon"></span>
                登录 / 注册
            </a>
        </div>
    </div>

    <main class="main-content">
        <div class="profile-container">
            <div class="profile-header">
                <div class="avatar" id="avatar-container">
                    <img src="" alt="" id="avatar-img">
                    <span id="avatar-emoji"></span>
                    <div class="avatar-overlay" id="avatar-overlay">📷</div>
                </div>
                <input type="file" id="avatar-input" accept="image/*">
                <h1 class="profile-name">张奶奶</h1>
                <p class="profile-phone">138****8888</p>
            </div>

            <div class="profile-section">
                <h2 class="section-title">基本信息</h2>
                <form id="profile-form">
                    <div class="info-row">
                        <span class="info-label">姓名</span>
                        <span class="info-value" id="display-name">张桂兰</span>
                        <input type="text" class="info-input" id="edit-name" name="name" value="张桂兰">
                    </div>
                    <div class="info-row">
                        <span class="info-label">年龄</span>
                        <span class="info-value" id="display-age">72岁</span>
                        <input type="number" class="info-input" id="edit-age" name="age" value="72">
                    </div>
                    <div class="info-row">
                        <span class="info-label">性别</span>
                        <span class="info-value" id="display-gender">女</span>
                        <select class="info-input" id="edit-gender" name="gender">
                            <option value="男">男</option>
                            <option value="女" selected>女</option>
                        </select>
                    </div>
                    <div class="info-row">
                        <span class="info-label">联系方式</span>
                        <span class="info-value" id="display-phone">13888888888</span>
                        <input type="tel" class="info-input" id="edit-phone" name="phone" value="13888888888">
                    </div>
                    <div class="info-row">
                        <span class="info-label">家庭住址</span>
                        <span class="info-value" id="display-address">北京市朝阳区幸福小区3号楼201室</span>
                        <input type="text" class="info-input" id="edit-address" name="address" value="北京市朝阳区幸福小区3号楼201室">
                    </div>
                </form>
            </div>

            <div class="profile-btn-container">
                <button class="btn-edit" id="edit-btn">编辑资料</button>
                <button class="btn-edit" id="save-btn">保存修改</button>
                <button class="btn-edit" id="cancel-btn">取消</button>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2026 居家适老 - 让爱与安全同在</p>
        </div>
    </footer>
    <script src="js/menu.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
