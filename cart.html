<!DOCTYPE html>
<html lang="zh-CN">

    <nav class="navbar">

            <ul class="nav-links">

                <li><a href="entrance.html">玄关区域</a></li>
                <li><a href="livingroom.html">客厅区域</a></li>
                <li><a href="bedroom.html">卧室区域</a></li>
                <li><a href="bathroom.html">卫生间区域</a></li>
                <li><a href="kitchen.html">厨房区域</a></li>
            </ul>
            <div class="nav-actions">
                <a href="cart.html" class="btn-cart">购物车<span id="cart-count"></span></a>
                <div class="menu-toggle" id="menuToggle">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </div>
    </nav>

    <div class="side-menu-overlay" id="sideMenuOverlay"></div>
    
    <div class="side-menu" id="sideMenu">
        <div class="side-menu-header">
            <h3>菜单</h3>
            <button class="side-menu-close" id="sideMenuClose">×</button>
        </div>
        <div class="side-menu-content">
            <a href="profile.html" class="side-menu-item">
                <span class="side-menu-icon"></span>

            </a>
            <a href="login.html" class="side-menu-item">

    <main class="main-content">
        <h1 class="section-title">我的购物车</h1>
        
        <div class="cart-container" id="cart-container">
            <div class="empty-cart">
                <div class="empty-cart-icon">🛒</div>

                <p class="empty-cart-desc">快去挑选适合您的适老化商品吧！</p>
                <a href="index.html" class="continue-shopping">继续购物</a>

        </div>

        <div class="cart-summary cart-summary-hidden" id="cart-summary">
            <div class="cart-total">总计：<span id="cart-total">¥0.00</span></div>
            <a href="checkout.html" class="btn-primary checkout-btn">立即结算</a>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2026 智慧居家养老 - 让爱与安全同在</p>
        </div>
